<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    * {
        box-sizing: border-box; /* CORREÇÃO AQUI */
    }

    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: white;
        display: flex;
        justify-content: left;
        align-items: center;
        height: 100vh;
		 background-size: cover;
         margin-left: 300px;
        
    }




    .modal {
    background: #ffffff;
    padding: 40px;
    width: 500px;
    height: 600px;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
    text-align: center;
	background: rgba(255, 255, 255, 0.2); /* precisa ser transparente */
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px); /* suporte Safari */
	animation: fadeDown 0.6s ease-out;
	animation: fadeDown 0.6s cubic-bezier(.22,1,.36,1);
	text-align: left;
	position: fixed;	
    border: 2px solid rgba(0, 150, 136, 0.4);
    }
	


    .modal h2 {
        margin-bottom: 25px;
        color: #000;
		
    }


.input-group label {
    color: #000;
    padding: 6px;
     }

    /* Container que segura o ícone e o input juntos */
.input-wrapper {
    position: relative; /* Necessário para posicionar o ícone "em cima" */
    display: flex;
    align-items: center;
    padding-top: 10px;
}

/* Estilizando o ícone */
.input-wrapper .icon {
    position: absolute;
    left: 15px;      /* Distância da borda esquerda */
    color: #6caaa5;  /* Usei a mesma cor da sua borda para combinar */
    font-size: 18px;
}

/* Ajustando o SEU input atual */
.input-group input {
    width: 100%;
    height: 50px;
    padding: 10px 10px 10px 45px; /* O segredo: aumentei o padding-left para 45px */
    border: 2px solid #b2dfdb;
    border-radius: 15px;
    outline: none;
    transition: 0.3s;
    font-size: 14px;
    box-sizing: border-box; /* Importante para o padding não "estourar" a largura */
}


    .input-group input:focus {
        border-color: #009688;
        box-shadow: 0 0 8px rgba(0, 150, 136, 0.4);
    }

    .btn-login {
        width: 100%;
        padding: 12px;
        background: #00bfa5;
        border: none;
        border-radius: 15px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        height: 50px;
    }

    .btn-login:hover {
        background: #009688;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 150, 136, 0.4);
    }
	
	@keyframes fadeDown {
    from {
        opacity: 0;
        transform: translateY(-40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.logincomo{
	color: #000;
	text-align: center;
	
}

.fa-google, .fa-facebook{

margin-right: 10px;
cursor: pointer;
}

.fa-github{
cursor: pointer;
}



.social-icons{
color: #000;
display: flex;
justify-content: center;
gap: 5px;
}

.social-icons i {
    transition: transform 0.3s ease;
}

.social-icons i:hover {
    transform: scale(1.2);
}

.logo {
position: absolute;
    top: 20px;    /* Distância do topo */
    right: 20px;  /* Distância da direita */
    
    width: 80px;  /* Ajuste o tamanho conforme precisar */
    height: auto;
    
    z-index: 10;
}


.login-options {
  display: flex;
  justify-content: space-between; /* Alinha um na esquerda e outro na direita */
  align-items: center;           /* Alinha verticalmente ao centro */
  margin-top: 15px;              /* Espaçamento superior */
  width: 100%;                   /* Garante que ocupe a largura total do modal */
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 8px;                      /* Espaço entre o quadradinho e o texto */
  color: #000;
  font-size: 14px;
}

.forgot-password {
  color: #000;                   /* Cor preta conforme sua imagem */
  text-decoration: none;
  font-size: 14px;
}

.forgot-password:hover {
  text-decoration: underline;
}



.homem {
   position: absolute;
    right: 250px;    /* Cola na direita */
    top: 100px;   /* Distância do topo */
    width: 700px; /* Bem pequena */

}

</style>
</head>

<body>

<div class="modal">
    <h2>Bem-vindo</h2>
<img src="logo1.png" class="logo">

   <div class="input-group">
  <label for="email">Email</label>
  <div class="input-wrapper">
    <i class="fas fa-envelope icon"></i>
    <input type="email" id="email" placeholder="Digite seu email">
  </div>
</div>

<br><br>

<div class="input-group">
  <label for="senha">Senha</label>
  <div class="input-wrapper">
    <i class="fas fa-lock icon"></i>
    <input type="password" id="senha" placeholder="Digite sua senha">
  </div>
</div>

<div class="login-options">
  <div class="remember-me">
    <input type="checkbox" id="remember">
    <label for="remember">Lembrar senha</label>
  </div>
  
  <a href="#" class="forgot-password">Esqueceu sua senha?</a>
</div>
 
<Br> <br>

    <button class="btn-login"><strong>Entrar</strong></button>
	
   

	<br><br><br><br>
	<div class="logincomo">
	<h3> Fazer login como: </h3>
	</div>

	<div class="social-icons">
	<i class="fa-brands fa-google fa-xl"></i>
	<i class="fa-brands fa-facebook fa-xl"></i>
	<i class="fa-brands fa-github fa-xl"></i>
</div>


</div>

<div class=".container-imagem">
<img src="homem.png" class="homem">
</div>

</body>
</html>
